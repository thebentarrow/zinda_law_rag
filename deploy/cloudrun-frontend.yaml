apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: zinda-law-frontend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/YOUR_PROJECT_ID/zinda-law/frontend:latest
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            # The VITE_API_URL is baked in at build time; set it in cloudbuild.yaml
            - name: ENVIRONMENT
              value: production
