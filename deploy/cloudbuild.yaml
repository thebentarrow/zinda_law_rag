substitutions:
  _REGION: us-central1
  _REPO: zinda-law
  _PROJECT_ID: YOUR_PROJECT_ID
  # Set this to the deployed backend URL after first deploy, then trigger a frontend rebuild
  _BACKEND_URL: https://zinda-law-backend-HASH-uc.a.run.app

steps:
  # ── Backend ─────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/backend:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/backend:latest
      - ./backend

  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/backend

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - zinda-law-backend
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=zinda-law-sa@${_PROJECT_ID}.iam.gserviceaccount.com

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    waitFor: [deploy-backend]
    args:
      - build
      - --build-arg=VITE_API_URL=${_BACKEND_URL}
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/frontend:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/frontend:latest
      - ./frontend

  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/frontend

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - zinda-law-frontend
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/frontend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/backend:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/frontend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
