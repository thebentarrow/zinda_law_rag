server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend when frontend and backend are on separate origins
    # Uncomment and set BACKEND_URL if deploying frontend standalone:
    # location /api/ {
    #     proxy_pass http://BACKEND_URL/api/;
    #     proxy_set_header Host $host;
    # }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
